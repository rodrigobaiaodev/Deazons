name: Auto Sync RSS & Sitemap

# Automação DESABILITADA temporariamente (schedule removido)
# Para reativar: adicione os secrets abaixo no GitHub e restaure o schedule:
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   - VITE_SUPABASE_URL
#   - VITE_SUPABASE_ANON_KEY
#   - VITE_SUPABASE_SERVICE_ROLE_KEY
#   - VITE_GEMINI_API_KEY
#   - VITE_TMDB_API_KEY (opcional, tem fallback)
#
# Schedule para reativar (a cada 3 horas):
# on:
#   schedule:
#     - cron: '0 */3 * * *'
#   workflow_dispatch:

on:
  workflow_dispatch: # Apenas manual - sem execução automática

jobs:
  sync_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Auto Sync & Post Array
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
        run: node scripts/auto-sync-rss.js
